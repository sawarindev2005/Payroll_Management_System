<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ระบบจัดการเงินเดือนพนักงาน</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="topbar">
        <h1>ระบบจัดการเงินเดือนพนักงาน</h1>
        <div class="topbar-actions">
            <span id="username-display" class="username-badge"></span>
            <button id="logout-btn" class="btn btn-outline">ออกจากระบบ</button>
        </div>
    </header>

    <main>
        <form id="employee-form" class="card">
            <input type="hidden" id="employee-id">

            <label for="name">ชื่อพนักงาน</label>
            <input type="text" id="name" required>

            <label for="position">ตำแหน่ง</label>
            <input type="text" id="position" required>

            <label for="base_salary">เงินเดือนฐาน</label>
            <input type="number" id="base_salary" step="0.01" min="0" required>

            <label for="bonus">โบนัส/เงินเพิ่ม</label>
            <input type="number" id="bonus" step="0.01" min="0" value="0">

            <label for="deduction">รายการหัก</label>
            <input type="number" id="deduction" step="0.01" min="0" value="0">

            <div class="form-actions">
                <button type="submit" id="submit-btn" class="btn btn-primary">เพิ่มพนักงาน</button>
                <button type="button" id="cancel-btn" class="btn btn-outline" style="display:none;">ยกเลิกการแก้ไข</button>
            </div>
        </form>

        <div class="card table-card">
            <table>
                <thead>
                    <tr>
                        <th>ชื่อ</th>
                        <th>ตำแหน่ง</th>
                        <th>เงินเดือนฐาน</th>
                        <th>โบนัส</th>
                        <th>หัก</th>
                        <th>เงินเดือนสุทธิ</th>
                        <th>บัญชี Login</th>
                        <th>จัดการ</th>
                    </tr>
                </thead>
                <tbody id="employee-table-body"></tbody>
            </table>
        </div>
    </main>

    <div class="modal-overlay" id="account-modal-overlay" style="display:none;">
        <div class="modal">
            <h2>สร้างบัญชี Login</h2>
            <p class="auth-subtitle">สำหรับ <strong id="account-modal-employee-name"></strong></p>

            <form id="account-form">
                <input type="hidden" id="account-employee-id">

                <label for="account-username">ชื่อผู้ใช้</label>
                <input type="text" id="account-username" required>

                <label for="account-password">รหัสผ่าน</label>
                <input type="password" id="account-password" required minlength="6">

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">สร้างบัญชี</button>
                    <button type="button" id="account-cancel-btn" class="btn btn-outline">ยกเลิก</button>
                </div>
            </form>

            <p id="account-error-message" class="error-text"></p>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
